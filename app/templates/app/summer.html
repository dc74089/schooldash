{% load static %}

<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount:wght,ELSH@100..900,0..100&display=swap"
          rel="stylesheet">

    <link rel="icon" href="{% static 'app/clock.svg' %}">

    <script>
        function updateCountdown() {
            const targetDate = new Date('August 12, 2026 08:00:00 EDT');
            const now = new Date();
            const diff = targetDate - now;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCountdown();
            setInterval(updateCountdown, 1000);
        });
    </script>

    <style>
        #countdown {
            font-family: 'Bitcount', monospace;
            font-size: 8vw;
            font-weight: 300;
            font-variation-settings: 'ELSH' 50;
        }
    </style>
</head>

<body style="background-color: #212137;">
<div id="main" style="position:fixed; height: 100%; width: 100%; z-index: -9999;"></div>
<div style="display:flex; justify-content: center; align-items: center; height: 100%; width: 100%; color: white">
    <h1 id="countdown"></h1>
</div>
</body>
</html>
